startCommand:
  type: stdio
  commandFunction: |
    (config) => ({
      command: "zugawatch-mcp",
      args: [],
      env: {}
    })
configSchema:
  type: object
  properties:
    repetitionThreshold:
      type: integer
      default: 3
      description: "Identical-call count at which the runaway-loop rule (SENT003) fires."
