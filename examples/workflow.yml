# Drop this in .github/workflows/ of any repo that ships or consumes an MCP server.
name: MCP Sentinel
on: [push, pull_request]

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Zuga-luga/mcp-sentinel@v0.2
        with:
          tools: examples/tools.json        # rug-pull check (pin on first run)
          chain: examples/chain_exfil.json  # grade the recorded session
