name: "MCP Sentinel"
description: "Gate CI on MCP tool-definition drift (rug-pulls) and call-chain anomalies. Fails the build on grade C or below."
branding:
  icon: "shield"
  color: "blue"

inputs:
  tools:
    description: "Path to a tools.json (pinned/verified for rug-pull drift). Optional."
    required: false
    default: ""
  lock:
    description: "Lockfile path. Created on first run, verified against on later runs."
    required: false
    default: "sentinel.lock"
  chain:
    description: "Path to a recorded call-chain JSON to grade. Optional."
    required: false
    default: ""
  ref:
    description: "pip spec to install. Defaults to the git tag (works before PyPI publish); set to 'mcp-sentinel==0.3.0' once published."
    required: false
    default: "git+https://github.com/Zuga-luga/mcp-sentinel@v0.3"

outputs:
  grade:
    description: "The A-F grade for the chain (empty if no chain provided)."
    value: ${{ steps.run.outputs.grade }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - id: run
      shell: bash
      env:
        TOOLS: ${{ inputs.tools }}
        LOCK: ${{ inputs.lock }}
        CHAIN: ${{ inputs.chain }}
        REF: ${{ inputs.ref }}
      run: |
        set -e
        # Inputs are bound to env vars (never interpolated into the script) to
        # prevent shell injection via attacker-controlled input values.
        if ! [[ "$REF" =~ ^[A-Za-z0-9._@/:=+-]+$ ]]; then
          echo "Refusing to install: 'ref' contains disallowed characters." >&2
          exit 2
        fi
        pip install "$REF"
        status=0
        if [ -n "$TOOLS" ]; then
          if [ -f "$LOCK" ]; then
            echo "::group::Rug-pull / drift check"
            sentinel verify "$TOOLS" --lock "$LOCK" || status=1
            echo "::endgroup::"
          else
            echo "No lockfile at $LOCK — pinning for the first time."
            sentinel pin "$TOOLS" --lock "$LOCK"
          fi
        fi
        if [ -n "$CHAIN" ]; then
          echo "::group::Call-chain grade"
          out=$(sentinel grade "$CHAIN") || status=1
          echo "$out"
          grade=$(echo "$out" | head -1 | sed -E 's/^GRADE ([A-F]).*/\1/')
          echo "grade=$grade" >> "$GITHUB_OUTPUT"
          echo "### MCP Sentinel: grade $grade" >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"
        fi
        exit $status
